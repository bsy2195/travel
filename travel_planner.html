
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 여행 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root { --sand:#F5ECD7; --deep:#1A1209; --amber:#C17F24; --rust:#8B3A2A; --cream:#FAF5EC; --mist:#E8DFC8; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--cream); color:var(--deep); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }
.container { max-width:800px; margin:0 auto; padding:60px 24px; }
.header { text-align:center; margin-bottom:56px; animation:fadeDown 0.8s ease both; }
.header-badge { display:inline-block; font-size:11px; font-weight:500; letter-spacing:3px; color:var(--amber); border:1px solid var(--amber); padding:6px 16px; margin-bottom:24px; }
.header h1 { font-family:'DM Serif Display',serif; font-size:clamp(36px,7vw,64px); line-height:1.1; color:var(--deep); margin-bottom:16px; }
.header h1 em { font-style:italic; color:var(--amber); }
.header p { font-size:15px; color:#6B5E4A; font-weight:300; line-height:1.7; }
.form-card { background:white; border:1px solid var(--mist); padding:48px; box-shadow:0 4px 40px rgba(26,18,9,0.06); animation:fadeUp 0.8s 0.2s ease both; }
.form-group { margin-bottom:28px; }
.form-label { display:block; font-size:11px; font-weight:500; letter-spacing:2px; color:var(--amber); margin-bottom:12px; }
.form-input { width:100%; padding:14px 18px; border:1px solid var(--mist); background:var(--cream); font-family:'Noto Sans KR',sans-serif; font-size:15px; color:var(--deep); outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
.form-input:focus { border-color:var(--amber); box-shadow:0 0 0 3px rgba(193,127,36,0.1); }
.number-input { display:flex; align-items:center; gap:12px; }
.number-input input { width:80px; text-align:center; padding:14px; border:1px solid var(--mist); background:var(--cream); font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:500; color:var(--deep); outline:none; }
.number-btn { width:40px; height:40px; border:1px solid var(--mist); background:var(--cream); font-size:20px; cursor:pointer; transition:all 0.2s; color:var(--amber); display:flex; align-items:center; justify-content:center; }
.number-btn:hover { background:var(--amber); color:white; border-color:var(--amber); }
.choice-group { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
.choice-btn { padding:10px 14px; border:1px solid var(--mist); background:var(--cream); font-family:'Noto Sans KR',sans-serif; font-size:13px; color:#6B5E4A; cursor:pointer; transition:all 0.2s; text-align:center; }
.choice-btn:hover { border-color:var(--amber); color:var(--amber); }
.choice-btn.selected { background:var(--amber); border-color:var(--amber); color:white; font-weight:500; }
.multi-choice .choice-btn.selected { background:var(--amber); border-color:var(--amber); color:white; }
.section-divider { border:none; border-top:1px solid var(--mist); margin:32px 0; }
.section-title { font-size:13px; font-weight:500; color:#6B5E4A; margin-bottom:16px; letter-spacing:1px; }
.submit-btn { width:100%; padding:18px; background:var(--deep); color:var(--sand); border:none; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:500; letter-spacing:2px; cursor:pointer; transition:background 0.3s; margin-top:8px; }
.submit-btn:hover { background:var(--amber); }
.loading { display:none; text-align:center; padding:60px 0; }
.loading.show { display:block; }
.loading-icon { font-size:48px; display:block; margin-bottom:20px; animation:spin 3s linear infinite; }
.loading p { font-size:14px; color:#6B5E4A; }
.loading-dots { display:inline-flex; gap:6px; margin-top:16px; }
.loading-dots span { width:6px; height:6px; background:var(--amber); border-radius:50%; animation:bounce 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay:0.2s; }
.loading-dots span:nth-child(3) { animation-delay:0.4s; }
.result-card { display:none; background:white; border:1px solid var(--mist); padding:48px; box-shadow:0 4px 40px rgba(26,18,9,0.06); }
.result-card.show { display:block; animation:fadeUp 0.6s ease both; }
.result-header { margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid var(--mist); }
.result-title { font-family:'DM Serif Display',serif; font-size:28px; color:var(--deep); margin-bottom:12px; }
.result-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.result-tag { font-size:11px; padding:4px 10px; background:var(--cream); border:1px solid var(--mist); color:#6B5E4A; }
.result-actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
.action-btn { padding:10px 20px; border:1px solid var(--deep); background:transparent; font-family:'Noto Sans KR',sans-serif; font-size:12px; letter-spacing:1px; color:var(--deep); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
.action-btn:hover { background:var(--deep); color:var(--sand); }
.action-btn.primary { background:var(--amber); border-color:var(--amber); color:white; }
.action-btn.primary:hover { background:var(--deep); border-color:var(--deep); }
.result-content { font-size:14px; line-height:1.9; color:#3A2E20; white-space:pre-wrap; font-family:'Noto Serif KR',serif; font-weight:300; margin-top:24px; }
.error-msg { display:none; background:#FFF5F5; border:1px solid #FFCDD2; padding:16px 20px; color:var(--rust); font-size:14px; margin-top:16px; }
.error-msg.show { display:block; }
.footer { text-align:center; margin-top:48px; font-size:12px; color:#A89880; }
@keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
@media print {
  .header, .result-actions, .footer { display:none; }
  .result-card { box-shadow:none; border:none; padding:0; }
  body { background:white; }
}
@media(max-width:600px) { .form-card,.result-card{padding:28px 20px} .choice-group{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-badge">✦ AI Travel Planner ✦</div>
    <h1>나만의 <em>여행</em><br>일정 만들기</h1>
    <p>여행지와 취향을 입력하면 AI가 최적의 2박 3일 일정을 만들어드립니다</p>
  </div>

  <div class="form-card" id="formCard">

    <!-- 여행지 -->
    <div class="form-group">
      <label class="form-label">✈ 여행지</label>
      <input type="text" class="form-input" id="destination" placeholder="예: 일본 후쿠오카, 제주도, 파리..." />
    </div>

    <!-- 인원수 -->
    <div class="form-group">
      <label class="form-label">👥 인원수</label>
      <div class="number-input">
        <button class="number-btn" onclick="changeNum(-1)">−</button>
        <input type="number" id="people" value="2" min="1" max="20" readonly />
        <button class="number-btn" onclick="changeNum(1)">+</button>
        <span style="font-size:14px;color:#6B5E4A;">명</span>
      </div>
    </div>

    <!-- 동행인 -->
    <div class="form-group">
      <label class="form-label">🤝 동행인 유형</label>
      <div class="choice-group" id="companion">
        <button class="choice-btn" data-value="혼자">🙋 혼자</button>
        <button class="choice-btn" data-value="커플">💑 커플</button>
        <button class="choice-btn" data-value="부모님과 함께">👨‍👩‍👧 부모님과</button>
        <button class="choice-btn" data-value="아이 동반 가족">👨‍👩‍👧‍👦 아이 동반</button>
        <button class="choice-btn" data-value="친구들과 단체">👫 친구 단체</button>
        <button class="choice-btn" data-value="직장 동료 단체">💼 직장 단체</button>
      </div>
    </div>

    <!-- 여행 스타일 -->
    <div class="form-group">
      <label class="form-label">🎨 여행 스타일</label>
      <div class="choice-group" id="style">
        <button class="choice-btn" data-value="관광명소 정복형">🗺 명소 정복</button>
        <button class="choice-btn" data-value="현지인 맛집 탐방형">🍜 맛집 탐방</button>
        <button class="choice-btn" data-value="여유로운 힐링형">🌿 힐링</button>
        <button class="choice-btn" data-value="인스타 감성형">📸 인스타 감성</button>
      </div>
    </div>

    <!-- 음식 종류 -->
    <div class="form-group">
      <label class="form-label">🍽 선호 음식 <span style="font-size:10px;color:#A89880;">(복수 선택 가능)</span></label>
      <div class="choice-group multi-choice" id="food">
        <button class="choice-btn" data-value="해산물">🦞 해산물</button>
        <button class="choice-btn" data-value="고기">🥩 고기</button>
        <button class="choice-btn" data-value="현지 전통음식">🍱 현지 전통</button>
        <button class="choice-btn" data-value="채식">🥗 채식</button>
        <button class="choice-btn" data-value="디저트 카페">🍰 디저트</button>
        <button class="choice-btn" data-value="상관없음">✨ 상관없음</button>
      </div>
    </div>

    <!-- 예산 -->
    <div class="form-group">
      <label class="form-label">💰 예산</label>
      <div class="choice-group" id="budget">
        <button class="choice-btn" data-value="저렴하게">🪙 저렴하게</button>
        <button class="choice-btn" data-value="적당하게">💳 적당하게</button>
        <button class="choice-btn" data-value="럭셔리하게">💎 럭셔리하게</button>
      </div>
    </div>

    <hr class="section-divider">
    <div class="section-title">🔧 추가 옵션</div>

    <!-- 추가 옵션 -->
    <div class="form-group">
      <div class="choice-group multi-choice" id="options">
        <button class="choice-btn" data-value="비 오는 날 실내 대안 일정 포함">🌧 우천 대안</button>
        <button class="choice-btn" data-value="노약자를 위한 충분한 휴식 포함">🪑 여유 일정</button>
        <button class="choice-btn" data-value="아이 친화적 장소 위주">🧒 아이 친화</button>
        <button class="choice-btn" data-value="여행지 주의사항 및 안전정보 포함">⚠️ 주의사항</button>
        <button class="choice-btn" data-value="경비 상세 내역 자동 계산">💹 경비 계산</button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <button class="submit-btn" onclick="generatePlan()">✦ 여행 일정 생성하기 ✦</button>
  </div>

  <div class="loading" id="loading">
    <span class="loading-icon">🌍</span>
    <p>AI가 최적의 여행 일정을 만들고 있습니다</p>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-title" id="resultTitle">여행 일정</div>
      <div class="result-tags" id="resultTags"></div>
      <div class="result-actions">
        <button class="action-btn primary" onclick="printPDF()">📄 PDF 저장</button>
        <button class="action-btn" onclick="copyResult()">📋 텍스트 복사</button>
        <button class="action-btn" onclick="resetForm()">← 다시 만들기</button>
      </div>
    </div>
    <div class="result-content" id="resultContent"></div>
  </div>

  <div class="footer">Powered by Groq AI ✦ Made with Claude</div>
</div>

<script>
var K = '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';

// 인원수 조절
function changeNum(delta) {
  var el = document.getElementById('people');
  var v = parseInt(el.value) + delta;
  if (v < 1) v = 1;
  if (v > 20) v = 20;
  el.value = v;
}

// 단일 선택
document.querySelectorAll('#companion, #style, #budget').forEach(function(group) {
  group.querySelectorAll('.choice-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      group.querySelectorAll('.choice-btn').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
    });
  });
});

// 복수 선택 (음식, 옵션)
document.querySelectorAll('#food, #options').forEach(function(group) {
  group.querySelectorAll('.choice-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      btn.classList.toggle('selected');
    });
  });
});

function getSel(id) {
  var btn = document.querySelector('#' + id + ' .choice-btn.selected');
  return btn ? btn.dataset.value : null;
}

function getMultiSel(id) {
  var btns = document.querySelectorAll('#' + id + ' .choice-btn.selected');
  var vals = [];
  btns.forEach(function(b) { vals.push(b.dataset.value); });
  return vals.join(', ');
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}

async function generatePlan() {
  var dest = document.getElementById('destination').value.trim();
  var people = document.getElementById('people').value;
  var comp = getSel('companion');
  var sty = getSel('style');
  var bud = getSel('budget');
  var food = getMultiSel('food');
  var opts = getMultiSel('options');

  document.getElementById('errorMsg').classList.remove('show');
  if (!dest) { showError('여행지를 입력해주세요!'); return; }
  if (!comp) { showError('동행인 유형을 선택해주세요!'); return; }
  if (!sty) { showError('여행 스타일을 선택해주세요!'); return; }
  if (!bud) { showError('예산을 선택해주세요!'); return; }

  document.getElementById('formCard').style.display = 'none';
  document.getElementById('loading').classList.add('show');
  document.getElementById('resultCard').classList.remove('show');

  var prompt = '너는 15년 경력의 베테랑 여행 플래너야. 아래 조건으로 2박 3일 여행 일정을 만들어줘.\n\n';
  prompt += '- 여행지: ' + dest + '\n';
  prompt += '- 인원수: ' + people + '명\n';
  prompt += '- 동행인: ' + comp + '\n';
  prompt += '- 여행 스타일: ' + sty + '\n';
  prompt += '- 예산: ' + bud + '\n';
  if (food) prompt += '- 선호 음식: ' + food + '\n';
  if (opts) prompt += '- 추가 요청: ' + opts + '\n';
  prompt += '\n기본 조건:\n';
  prompt += '1. 이동 동선이 꼬이지 않도록 지역별로 묶어서 계획할 것\n';
  prompt += '2. 3시간마다 짧은 휴식(카페/공원)을 포함할 것\n';
  prompt += '3. 동행인 맞춤 특별 팁을 중간중간 포함할 것\n';
  prompt += '4. 날짜별로 [시간대 - 장소 - 상세 설명] 순으로 작성할 것\n';
  prompt += '5. 반드시 한국어로 작성할 것\n\n';
  prompt += '각 장소와 식당마다 아래 정보를 포함할 것:\n';
  prompt += '💰 예상 비용 (1인 기준 금액)\n';
  prompt += '🍽 대표 메뉴 3가지와 각 가격\n';
  prompt += '🕐 운영 시간\n';
  prompt += '📌 예약 필요 여부 및 팁\n';
  prompt += '⭐ 추천 이유 한 줄\n\n';
  if (opts && opts.includes('경비')) {
    prompt += '마지막에 [전체 예상 경비 요약]을 ' + people + '명 기준으로 항목별로 정리해줄 것 (숙박/식비/교통/입장료/합계)\n';
  }
  if (opts && opts.includes('주의사항')) {
    prompt += '마지막에 [여행지 주의사항 및 안전정보]를 5가지 이상 정리해줄 것\n';
  }

  try {
    var res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + K },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.7,
        max_tokens: 3000
      })
    });
    var data = await res.json();
    if (data.choices && data.choices[0]) {
      var text = data.choices[0].message.content;
      document.getElementById('loading').classList.remove('show');
      document.getElementById('resultTitle').textContent = dest + ' 2박 3일 (' + people + '명)';
      document.getElementById('resultTags').innerHTML =
        '<span class="result-tag">' + comp + '</span>' +
        '<span class="result-tag">' + sty + '</span>' +
        '<span class="result-tag">' + bud + '</span>' +
        (food ? '<span class="result-tag">🍽 ' + food + '</span>' : '');
      document.getElementById('resultContent').textContent = text;
      document.getElementById('resultCard').classList.add('show');
    } else { throw new Error('오류'); }
  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('formCard').style.display = 'block';
    showError('오류가 발생했습니다. 다시 시도해주세요.');
  }
}

function printPDF() {
  window.print();
}

function copyResult() {
  var text = document.getElementById('resultContent').textContent;
  navigator.clipboard.writeText(text).then(function() {
    alert('📋 일정이 클립보드에 복사되었습니다!');
  });
}

function resetForm() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('formCard').style.display = 'block';
  document.getElementById('destination').value = '';
  document.getElementById('people').value = 2;
  document.querySelectorAll('.choice-btn').forEach(function(b) { b.classList.remove('selected'); });
  document.getElementById('errorMsg').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
